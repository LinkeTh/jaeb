networks:
  obs:
    driver: bridge

volumes:
  prometheus_data: {}
  loki_data: {}
  tempo_data: {}
  grafana_data: {}

services:

  # ── Rust app ─────────────────────────────────────────────────────────────
  app:
    build:
      context: ../../..
      dockerfile: examples/observability-stack/Dockerfile
    environment:
      LOKI_URL: "http://loki:3100"
      OTLP_ENDPOINT: "http://tempo:4317"
      PROMETHEUS_PORT: "3000"
      TICK_MS: "400"
      RUST_LOG: "info,jaeb=debug"
    ports:
      - "3000:3000"
    networks: [obs]
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    restart: on-failure

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    networks: [obs]
    depends_on: [app]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Loki ──────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    networks: [obs]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Tempo ─────────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.7.2
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo-config.yml
    ports:
      - "3200:3200"   # Tempo HTTP query API
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    networks: [obs]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.1
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_FEATURE_TOGGLES_ENABLE: "traceToMetrics"
    ports:
      - "3001:3000"
    networks: [obs]
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
